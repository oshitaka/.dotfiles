font_family      BigBlueTermPlus Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0
inactive_text_alpha 0.8

mouse_hide_wait 3.0
detect_urls yes

copy_on_select yes
strip_trailing_spaces smart

window_margin_width 11

# Tabs
map shitf+ctrl+t new_tab_with_cwd
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5 
tab_bar_edge bottom
tab_separator " |"
#tab_powerline_style slanted
tab_bar_style separator
# To navigate between tabs press "CTRL + SHIFT + ARROWS" or "CTRL + SHIFT + TAB"

# BEGIN_KITTY_THEME
include catppuccin_theme/mocha.conf
# END_KITTY_THEME 
